<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="sgIconTitle sgIconDesc">
  <title id="sgIconTitle">SimdiGetir Icon</title>
  <desc id="sgIconDesc">SimdiGetir SG pin icon with lightning bolt</desc>
  <defs>
    <linearGradient id="sgIconCard" x1="4" y1="3" x2="60" y2="61" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10265A"/>
      <stop offset="1" stop-color="#081733"/>
    </linearGradient>
    <linearGradient id="sgIconPinStroke" x1="13" y1="9" x2="50" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4980FF"/>
      <stop offset="1" stop-color="#2DE8FF"/>
    </linearGradient>
    <linearGradient id="sgIconBolt" x1="27" y1="4" x2="42" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF9C7"/>
      <stop offset="0.52" stop-color="#FFD552"/>
      <stop offset="1" stop-color="#FF9900"/>
    </linearGradient>
    <filter id="sgIconBlueGlow" x="0" y="0" width="64" height="64" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.1" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.07 0 0 0 0 0.48 0 0 0 0 1 0 0 0 0.48 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#sgIconCard)"/>

  <g filter="url(#sgIconBlueGlow)">
    <path d="M32 9C23.2 9 16 16.1 16 24.9C16 33.9 21.9 39.7 32 48.7C42.1 39.7 48 33.9 48 24.9C48 16.1 40.8 9 32 9Z" fill="#0B1E49" stroke="url(#sgIconPinStroke)" stroke-width="1.8"/>
    <circle cx="32" cy="25" r="9.6" fill="#0D2659"/>
    <text x="23.4" y="28.8" font-family="'Segoe UI Black', 'Arial Black', Arial, sans-serif" font-size="9.5" font-style="italic" font-weight="900" fill="#F6FAFF">S</text>
    <text x="29.4" y="28.8" font-family="'Segoe UI Black', 'Arial Black', Arial, sans-serif" font-size="9.5" font-style="italic" font-weight="900" fill="#F6FAFF">G</text>
    <path d="M34.4 4L27.8 18H34.7L29.2 33.2L43.7 17.1H36.8L43 4H34.4Z" fill="url(#sgIconBolt)" stroke="#FFF0AD" stroke-width="0.55"/>
  </g>
</svg>
