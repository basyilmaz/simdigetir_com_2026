name: Quality Gate

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:

jobs:
  laravel-quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce Version Bump On Push
        if: github.event_name == 'push'
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push detected, VERSION check skipped."
            exit 0
          fi

          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qx "VERSION"; then
            echo "VERSION file updated."
          else
            echo "VERSION file must be updated on every push."
            echo "Run: php scripts/version/bump-version.php --part=patch"
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, pdo_sqlite, sqlite3
          tools: composer:v2
          coverage: none

      - name: Hygiene Check (Changed Files)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              git diff-tree --no-commit-id --name-only -r --diff-filter=ACMR "${{ github.sha }}" \
                | php scripts/hygiene/check-file-hygiene.php --files-from-stdin
              exit 0
            else
              RANGE_FROM="$BEFORE"
            fi
            RANGE_TO="${{ github.sha }}"
          else
            RANGE_FROM="${{ github.event.pull_request.base.sha }}"
            RANGE_TO="${{ github.sha }}"
          fi

          git diff --name-only --diff-filter=ACMR "$RANGE_FROM" "$RANGE_TO" \
            | php scripts/hygiene/check-file-hygiene.php --files-from-stdin

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run quality gate
        shell: pwsh
        run: ./scripts/run-quality-gate.ps1
